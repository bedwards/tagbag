server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Common proxy headers (inherited by all location blocks)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Dashboard static files
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Proxy Gitea API (dashboard calls /gitea/api/v1/...)
    location /gitea/ {
        proxy_pass http://gitea:3000/;
    }

    # Proxy Plane API (dashboard calls /plane/api/...)
    location /plane/ {
        proxy_pass http://plane-api:8000/;
    }

    # Proxy Woodpecker API (dashboard calls /woodpecker/api/...)
    location /woodpecker/ {
        proxy_pass http://woodpecker-server:8000/;
    }
}
